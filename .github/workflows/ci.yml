name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: uv sync --group linting
      - run: bash scripts/lint.sh

  tests:
    name: py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu, macos, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions

      - run: cargo test --workspace --exclude ormdantic-py
      - run: uv sync --group dev
      - run: uv run --group dev maturin develop
      - run: bash scripts/test.sh
        env:
          DATABASE_URL: sqlite:///db.sqlite3

  database-services:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: mysql
        options: >-
          --health-cmd "mysqladmin ping -hmysql -uroot -pmysql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 3306:3306
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: mariadb
          MARIADB_DATABASE: mariadb
        options: >-
          --health-cmd "mariadb-admin ping -hmariadb -uroot -pmariadb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 3307:3306
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p ormdantic-engine
        env:
          ORMDANTIC_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/postgres
          ORMDANTIC_MYSQL_URL: mysql://root:mysql@localhost:3306/mysql
          ORMDANTIC_MARIADB_URL: mariadb://root:mariadb@localhost:3307/mariadb

  optional-enterprise-engines:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable

      - run: cargo test -p ormdantic-engine --features mssql,oracle --test mssql_exec --test oracle_exec
        env:
          ORMDANTIC_MSSQL_URL: ${{ secrets.ORMDANTIC_MSSQL_URL }}
          ORMDANTIC_ORACLE_URL: ${{ secrets.ORMDANTIC_ORACLE_URL }}

  check:
    if: always()
    needs: [lint, tests, database-services]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
