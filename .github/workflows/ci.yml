name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: yezz123/setup-uv@v4
        with:
          uv-version: "0.9.28"
          uv-venv: ".venv"
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: uv pip install -r requirements/pyproject.txt && uv pip install -r requirements/linting.txt
      - run: bash scripts/lint.sh

  tests:
    name: py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu, macos, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: yezz123/setup-uv@v4
        with:
          uv-version: "0.9.28"
          uv-venv: ".venv"
      - run: cargo test --workspace --exclude ormdantic-py
      - run: uv pip install -r requirements/pyproject.txt && uv pip install -r requirements/testing.txt
      - run: uv pip install maturin
      - run: maturin develop
      - run: bash scripts/test.sh
        env:
          DATABASE_URL: sqlite:///db.sqlite3

  check:
    if: always()
    needs: [lint, tests]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
